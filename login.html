<!DOCTYPE html>
<html>
<head><title>Connexion Patient</title></head>
<body>

<h2>🔐 Connexion Patient</h2>
<input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="password" placeholder="Mot de passe"><br><br>

    appId: "1:889153327051:web:4693562f63e56ba96f704e",
    measurementId: "G-Q406QZNSQ2"
  };
const auth = firebase.auth();
const db = firebase.firestore();

function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    auth.signInWithEmailAndPassword(email, password)
    .then(() => window.location.href = "dashboard.html")
    .catch((error) => document.getElementById("msg").innerText = "❌ " + error.message);
}
</script>
