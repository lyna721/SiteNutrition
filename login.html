<!DOCTYPE html>
<html>
<head><title>Connexion Patient</title></head>
<body>

<h2>🔐 Connexion Patient</h2>
<input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="password" placeholder="Mot de passe"><br><br>
<button onclick="login()">Se connecter</button>
<p id="msg"></p>
<p>Pas de compte ? <a href="register.html">Créer un compte</a></p>

<script src="https://www.gstatic.com/firebasejs/10.15.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.15.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.15.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
    apiKey: "TON_API_KEY",
    authDomain: "TON_PROJET.firebaseapp.com",
    projectId: "TON_PROJET",
    storageBucket: "TON_PROJET.appspot.com",
    messagingSenderId: "ID",
    appId: "ID"
};
const app = firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    auth.signInWithEmailAndPassword(email, password)
    .then(() => window.location.href = "dashboard.html")
    .catch((error) => document.getElementById("msg").innerText = "❌ " + error.message);
}
</script>
</body>
</html>
